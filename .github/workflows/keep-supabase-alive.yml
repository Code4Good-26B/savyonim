name: Keep Supabase Alive

on:
  schedule:
    # Run every day at 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query Supabase Database
        # IMPORTANT: hit the REST (PostgREST) API against a real table, NOT
        # /auth/v1/health. The auth health check never touches Postgres, so it
        # does NOT reset Supabase's 7-day inactivity pause timer. A /rest/v1
        # query executes an actual SELECT against the database, which does.
        run: |
          curl --fail-with-body -sS \
            "${{ secrets.SUPABASE_URL }}/rest/v1/keep_alive?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
